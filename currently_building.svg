  <!-- SmartPrint card (right) -->
  <rect x="560" y="86" width="310" height="118" rx="14" fill="#1a1a2e" stroke="#48bb78" stroke-width="0.8"/>
  <rect x="560" y="86" width="5" height="118" rx="3" fill="#48bb78"/>

  <circle cx="585" cy="106" r="5" fill="#48bb78" opacity="0.9"/>
  <circle cx="585" cy="106" r="9" fill="#48bb78" fill-opacity="0.2"/>

  <text x="607" y="110" font-family="'Georgia', serif" font-weight="700" font-size="13" fill="#ffffff">SmartPrint Business System</text>
