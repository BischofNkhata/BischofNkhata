<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="acc7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.08"/>
      <stop offset="50%" style="stop-color:#e94560;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <rect width="900" height="220" fill="url(#bg7)"/>
  <defs>
    <pattern id="grid7" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" stroke-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="900" height="220" fill="url(#grid7)"/>

  <!-- Section heading -->
  <text x="30" y="44" font-family="'Georgia', serif" font-weight="900" font-size="26" fill="#ffffff" letter-spacing="2">CURRENTLY BUILDING</text>
