  <rect x="30" y="48" width="60" height="2.5" fill="url(#acc5)" rx="2"/>

  <!-- Gmail card -->
  <rect x="30" y="68" width="244" height="72" rx="12" fill="#1e1e2e" stroke="#D14836" stroke-width="0.8"/>
