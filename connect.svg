  <text x="528" y="110" text-anchor="middle" font-family="'Georgia', serif" font-weight="900" font-size="15" fill="#25D366">W</text>
  <text x="558" y="98" font-family="'Georgia', serif" font-weight="700" font-size="11" fill="#ffffff">WhatsApp</text>
  <text x="558" y="114" font-family="'Georgia', serif" font-size="10" fill="#a0aec0">+265 992 501 767</text>

